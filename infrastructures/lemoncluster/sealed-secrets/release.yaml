apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets-controller
  namespace: sealed-secrets
spec:
  interval: 1h
  releaseName: sealed-secrets-controller
  chart:
    spec:
      chart: sealed-secrets
      version: "2.18.6"
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
        namespace: sealed-secrets
      interval: 1h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    # Name everything "sealed-secrets-controller" so the kubeseal CLI finds it by default
    fullnameOverride: sealed-secrets-controller
    # Pin image to the project's own GHCR registry (safe from the docker.io/bitnami reshuffle)
    image:
      registry: ghcr.io
      repository: bitnami-labs/sealed-secrets-controller
      tag: "0.37.0"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
