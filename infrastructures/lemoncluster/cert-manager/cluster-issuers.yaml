apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: lemoncluster-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: lemoncluster-internal-ca
  secretName: lemoncluster-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  duration: 87600h
  renewBefore: 720h
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-ca
spec:
  ca:
    secretName: lemoncluster-ca-secret
