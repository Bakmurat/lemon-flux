apiVersion: v1
kind: ConfigMap
metadata:
  name: moathsalman-site
  namespace: moathsalman
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Moath Salman</title>
      <style>
        :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); }
        header { padding:3rem 1.5rem 1rem; text-align:center; }
        header h1 { margin:0; font-size:2.6rem; letter-spacing:-0.02em; }
        header p { margin:.5rem 0 0; color:var(--muted); font-size:1.15rem; }
        .actions { text-align:center; margin:1.5rem 0; }
        .btn { display:inline-block; background:var(--accent); color:#0f172a; text-decoration:none; font-weight:600; padding:.7rem 1.4rem; border-radius:8px; transition:opacity .15s; }
        .btn:hover { opacity:.85; }
        .resume { max-width:900px; margin:0 auto 3rem; padding:0 1rem; }
        .resume object, .resume iframe { width:100%; height:80vh; border:1px solid var(--card); border-radius:10px; background:#fff; }
        footer { text-align:center; color:var(--muted); font-size:.85rem; padding:1.5rem; }
        footer strong { color:var(--text); }
      </style>
    </head>
    <body>
      <header>
        <h1>Moath Salman</h1>
        <p>DevOps / Platform Engineer</p>
      </header>
      <div class="actions">
        <a class="btn" href="/resume.pdf" download>Download r&eacute;sum&eacute; (PDF)</a>
      </div>
      <div class="resume">
        <object data="/resume.pdf" type="application/pdf">
          <iframe src="/resume.pdf" title="Moath Salman resume"></iframe>
        </object>
      </div>
      <footer>
        Served from <strong>lemoncluster</strong> via Cloudflare Tunnel &middot; GitOps with FluxCD
      </footer>
    </body>
    </html>
binaryData:
  resume.pdf: 
