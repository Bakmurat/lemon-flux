    function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }
    const N_PER_GAME=10;
    let game, qi, score, streak, best;
    const quizEl=document.getElementById('quiz'), qcard=document.getElementById('qcard');
    function startQuiz(){
      game = shuffle(POOL.slice()).slice(0,N_PER_GAME).map(it=>{
        const opts=it.opts.map((text,i)=>({text,correct:i===it.a})); shuffle(opts);
        return {cat:it.cat,q:it.q,e:it.e,opts,aIdx:opts.findIndex(o=>o.correct)};
      });
      qi=0; score=0; streak=0; best=0; quizEl.style.display='grid'; renderQ();
    }
    function closeQuiz(){ quizEl.style.display='none'; }
    function topHtml(){ return `<span>Question <b>${qi+1}</b>/${game.length}</span><span>Score <b>${score}</b> · <span class="streak">🔥 ${streak}</span></span>`; }
    function renderQ(){
      const it=game[qi];
      qcard.innerHTML=`<div class="qtop">${topHtml()}</div>
        <div class="bar"><div style="width:${(qi/game.length)*100}%"></div></div>
        <span class="cat">${it.cat}</span><div class="q">${it.q}</div>
        <div class="opts">${it.opts.map((o,i)=>`<button class="opt" onclick="answerQ(${i})">${o.text}</button>`).join('')}</div>
        <div class="explain" id="explain"></div>
        <div class="nextrow"><button class="closeb" onclick="closeQuiz()">Close ✕</button><span id="nextwrap"></span></div>`;
    }
    function answerQ(i){
      const it=game[qi]; const btns=[...qcard.querySelectorAll('.opt')]; btns.forEach(b=>b.disabled=true);
      btns[it.aIdx].classList.add('correct');
      if(it.opts[i].correct){ score+=10+streak*2; streak++; best=Math.max(best,streak); }
      else { btns[i].classList.add('wrong'); streak=0; }
      const ex=document.getElementById('explain'); ex.textContent=it.e; ex.style.display='block';
      qcard.querySelector('.qtop').innerHTML=topHtml();
      const last=qi===game.length-1;
      document.getElementById('nextwrap').innerHTML=`<button onclick="${last?'resultsQ()':'nextQ()'}">${last?'See results →':'Next →'}</button>`;
    }
    function nextQ(){ qi++; renderQ(); }
    function resultsQ(){
      const max=game.length*10, pct=score/max;
      const rank=pct>=0.9?"☁️ Cloud Architect!":pct>=0.7?"🚀 Senior Engineer":pct>=0.4?"🛠️ Solid Practitioner":"🌱 Keep learning!";
      qcard.innerHTML=`<div class="result"><div class="rank">${rank}</div><div class="big">${score}</div>
        <p>points · best streak 🔥 ${best}</p>
        <button class="playagain" onclick="startQuiz()">Play again</button>
        <button class="playagain" style="background:#334155;color:#e2e8f0;margin-left:.4rem" onclick="closeQuiz()">Close</button></div>`;
    }
    </script>

    <script>
    // ---------- Easter eggs: typing role, Konami hyperdrive, terminal ----------
    const ROLES=["Platform Engineer","DevOps Engineer","Kubernetes Operator","Cloud Infrastructure Engineer","GitOps Practitioner","SRE"];
    let _r=0,_c=0,_del=false;
    (function type(){ const rt=document.getElementById('role-text'); if(!rt) return; const full=ROLES[_r];
      if(!_del){ rt.textContent=full.slice(0,++_c); if(_c===full.length){ _del=true; return setTimeout(type,1500);} }
      else { rt.textContent=full.slice(0,--_c); if(_c===0){ _del=false; _r=(_r+1)%ROLES.length; } }
      setTimeout(type,_del?40:85);
    })();

    // Konami code -> hyperdrive
    const KON=['arrowup','arrowup','arrowdown','arrowdown','arrowleft','arrowright','arrowleft','arrowright','b','a']; let _k=0;
    function banner(txt){ const b=document.getElementById('banner'); b.textContent=txt; b.style.opacity=1; clearTimeout(b._t); b._t=setTimeout(()=>b.style.opacity=0,3500); }
    function hyperdrive(){ window.speedBoost=16; banner('⚡ HYPERDRIVE ENGAGED'); setTimeout(()=>{window.speedBoost=1;},4200); }
    addEventListener('keydown',e=>{
      const k=(e.key||'').toLowerCase();
      if(k===KON[_k]){ if(++_k===KON.length){ hyperdrive(); _k=0; } } else { _k=(k===KON[0])?1:0; }
      if(k==='`' && e.target.id!=='term-input'){ e.preventDefault(); toggleTerm(); }
      if(k==='escape'){ const t=document.getElementById('term'); if(t && t.style.display==='grid'){ e.preventDefault(); toggleTerm(); } }
    });

    // Fake terminal
    const TB=()=>document.getElementById('term-body');
    function tprint(html){ const b=TB(); b.innerHTML+=html+'\n'; b.scrollTop=b.scrollHeight; }
    function toggleTerm(){ const t=document.getElementById('term'); const open=t.style.display!=='grid';
      t.style.display=open?'grid':'none'; if(open){ if(!TB().innerHTML) runCmd('help'); setTimeout(()=>document.getElementById('term-input').focus(),50); } }
    // Close the terminal when clicking the dark backdrop (outside the window)
    (function(){ const t=document.getElementById('term');
      if(t) t.addEventListener('mousedown',e=>{ if(e.target===t) toggleTerm(); }); })();
    const CMDS={
      help:()=>`<span class="ok">available commands:</span>\n  whoami   skills   experience   projects   certs   contact\n  ls   cat &lt;file&gt;   neofetch   htop   date   echo &lt;txt&gt;\n  kubectl get pods|nodes   flux get   helm list   curl &lt;url&gt;\n  resume   github   linkedin   clear   exit\n  <span class="dim">↑/↓ history · Tab autocomplete</span>`,
      whoami:()=>`moath — Platform Engineer · DevOps (5+ yrs). <span class="dim">U.S. Citizen, no sponsorship required.</span>`,
      ls:()=>`resume.pdf   skills/   experience/   projects/   certs/   contact.txt`,
      skills:()=>`Kubernetes · AWS (EKS) · Terraform · Istio · FluxCD · ArgoCD · Prometheus · Grafana · Docker · Helm · Bash · Python`,
      experience:()=>`Platform Engineer @ Egencia, American Express  <span class="dim">(2023–present)</span>\nDevOps Engineer @ Abbott  <span class="dim">(2020–2023)</span>`,
      projects:()=>`Kubernetes GitOps Platform — FluxCD Homelab  <span class="dim">github.com/Bakmurat/lemon-flux</span>\n  self-hosted K8s · FluxCD · Cloudflare Tunnel · Sealed Secrets · Istio · KEDA · EFK`,
      certs:()=>`AWS SAA-C03 · CKA · CKAD · HashiCorp Terraform Associate`,
      contact:()=>`email: moathsalman96@gmail.com\nlocation: Chicago, IL`,
      neofetch:()=>`<span class="ok">   .--.   </span> moath@lemoncluster\n<span class="ok">  |o_o |  </span> ---------------\n<span class="ok">  |:_/ |  </span> role: Platform Engineer\n<span class="ok"> //   \\ \\ </span> cluster: lemoncluster (RKE2)\n<span class="ok">(|     | )</span> cni: Cilium · gitops: FluxCD\n<span class="ok"> /'\\_ _/\`\\</span> ingress: Cloudflare Tunnel\n<span class="ok"> \\___)=(___/</span> uptime: warp speed`,
      helm:()=>`NAME             NAMESPACE     REVISION  STATUS    CHART\nistio-base       istio-system  3         deployed  base-1.22\nistiod           istio-system  3         deployed  istiod-1.22\nkube-prometheus  monitoring    7         deployed  kube-prometheus-stack-59\ncert-manager     cert-manager  2         deployed  cert-manager-1.15\ncloudflared      moathsalman   4         deployed  cloudflared-0.3`,
      flux:()=>`NAME             READY  MESSAGE                       REVISION\ninfrastructures  True   Applied revision: main        main@sha1:9f3c2ab\napps             True   Applied revision: main        main@sha1:9f3c2ab\nmoathsalman      True   Applied revision: main        main@sha1:9f3c2ab`,
      htop:()=>`  CPU[<span class="ok">|||||||||</span>          38%]   Tasks: 142, 21 thr\n  Mem[<span class="ok">|||||||||||||</span>      52%]   Load avg: 0.42 0.51 0.48\n  <span class="dim">PID USER   %CPU %MEM  COMMAND</span>\n  1042 root    4.2  1.8  kubelet\n  2183 root    3.1  2.4  cilium-agent\n  3288 1000    2.0  3.1  cloudflared tunnel run`,
      date:()=>new Date().toString(),
      github:()=>{ window.open('https://github.com/Bakmurat','_blank'); return 'opening github…'; },
      linkedin:()=>{ window.open('https://www.linkedin.com/in/moath-salman1a/','_blank'); return 'opening linkedin…'; },
      resume:()=>{ window.open('resume.pdf','_blank'); return 'opening resume.pdf…'; },
      sudo:()=>`<span class="warn">nice try 😏 — you already have root here.</span>`,
      coffee:()=>`☕ brewing… done.`,
      exit:()=>{ toggleTerm(); return ''; },
      clear:()=>{ TB().innerHTML=''; return ''; },
    };
    function runCmd(raw){
      const line=(raw||'').trim();
      if(line) tprint(`<span style="color:#b3a0ff;font-weight:700">❯</span> ${line.replace(/</g,'&lt;')}`);
      const parts=line.split(/\s+/), cmd=parts[0], rest=parts.slice(1), arg=rest.join(' ');
      if(cmd==='') return;
      if(cmd==='echo'){ tprint(arg.replace(/</g,'&lt;')); return; }
      if(cmd==='cat'){ const f=rest[0]||''; if(f==='resume.pdf'){ tprint(CMDS.resume()); return; } const fn=CMDS[f]||CMDS[f.replace('.txt','')]; tprint(fn?fn():`cat: ${f.replace(/</g,'&lt;')||''}: no such file`); return; }
      if(cmd==='kubectl'){
        if(arg==='get pods'){ tprint(`NAME                 READY   STATUS    AGE\nnginx-xxxx           1/1     Running   ∞\ncloudflared-aaaa     1/1     Running   ∞\ncloudflared-bbbb     1/1     Running   ∞`); return; }
        if(arg==='get nodes'){ tprint(`NAME                STATUS   ROLES    AGE   VERSION\nlemon-cp-1          Ready    control  42d   v1.30.2\nlemon-worker-a1b2   Ready    worker   42d   v1.30.2\nlemon-worker-c3d4   Ready    worker   18d   v1.30.2\nlemon-worker-e5f6   Ready    worker   3h    v1.30.2  <span class="dim">(karpenter)</span>`); return; }
        tprint(`try: kubectl get pods · kubectl get nodes`); return; }
      if(cmd==='curl'){ const u=rest[0]||''; tprint(u
        ? `<span class="dim">* Connected via Cloudflare Tunnel (no public LB)</span>\nHTTP/2 200\ncontent-type: text/html; charset=utf-8\nserver: cloudflare\ncf-cache-status: DYNAMIC\n<span class="ok">✔ served from lemoncluster</span>`
        : `curl: try a URL — e.g. curl moathsalman.com`); return; }
      const fn=CMDS[cmd]; const out=fn?fn():`command not found: ${cmd.replace(/</g,'&lt;')} — type <span class="ok">help</span>`;
      if(out) tprint(out);
    }
    (function(){ const inp=document.getElementById('term-input'); if(!inp) return;
      const hist=[]; let hi=0;
      const NAMES=Object.keys(CMDS).concat(['kubectl','curl','cat','echo']).sort();
      inp.addEventListener('keydown',e=>{
        if(e.key==='Enter'){ const v=inp.value; if(v.trim()) hist.push(v); hi=hist.length; runCmd(v); inp.value=''; }
        else if(e.key==='ArrowUp'){ e.preventDefault(); if(hist.length){ hi=Math.max(0,hi-1); inp.value=hist[hi]||''; } }
        else if(e.key==='ArrowDown'){ e.preventDefault(); if(hi<hist.length-1){ hi++; inp.value=hist[hi]; } else { hi=hist.length; inp.value=''; } }
        else if(e.key==='Tab'){ e.preventDefault(); const p=inp.value.trim(); if(!p) return;
          const m=NAMES.filter(n=>n.startsWith(p));
          if(m.length===1){ inp.value=m[0]+' '; } else if(m.length>1){ tprint('<span class="dim">'+m.join('   ')+'</span>'); } }
      }); })();

    // Live cluster HUD
    (function(){
      const $=id=>document.getElementById(id); if(!$('hud')) return;
      let cpu=38, mem=52, req=1204, nodes=4, pods=14, podTarget=14;
      const hist=new Array(60).fill(1204);
      const spark=$('spark'), sx=spark&&spark.getContext('2d');
      const start=Date.now()-(42*86400+6*3600+12*60+44)*1000;
      const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
      function set(id,w,warn){ const f=$(id); if(!f)return; f.style.width=Math.round(w)+'%'; f.classList.toggle('warn',warn); }
      function drawSpark(){ if(!sx)return; const w=spark.width,h=spark.height; sx.clearRect(0,0,w,h);
        const mn=Math.min(...hist), mx=Math.max(...hist), rng=(mx-mn)||1;
        sx.beginPath();
        hist.forEach((v,i)=>{ const x=i/(hist.length-1)*w, y=h-3-((v-mn)/rng)*(h-6); i?sx.lineTo(x,y):sx.moveTo(x,y); });
        sx.strokeStyle='#5eead4'; sx.lineWidth=1.4; sx.stroke();
        sx.lineTo(w,h); sx.lineTo(0,h); sx.closePath();
        const g=sx.createLinearGradient(0,0,0,h); g.addColorStop(0,'rgba(94,234,212,.28)'); g.addColorStop(1,'rgba(94,234,212,0)');
        sx.fillStyle=g; sx.fill(); }
      function tick(){
        cpu=clamp(cpu+(Math.random()-.5)*9,12,92);
        mem=clamp(mem+(Math.random()-.5)*5,30,88);
        req=clamp(req+(Math.random()-.5)*260,300,3200);
        if(Math.random()<0.07){ nodes=clamp(nodes+(Math.random()<.5?-1:1),3,9); podTarget=clamp(podTarget+(Math.random()<.5?-1:2),10,22); }
        pods+=(pods<podTarget)?1:(pods>podTarget?-1:0);
        hist.push(req); hist.shift();
        $('m-cpu').textContent=Math.round(cpu)+'%'; set('f-cpu',cpu,cpu>80);
        $('m-mem').textContent=Math.round(mem)+'%'; set('f-mem',mem,mem>80);
        $('m-req').textContent=Math.round(req).toLocaleString();
        $('m-nodes').textContent=nodes;
        $('m-pods').textContent=pods+' / '+podTarget; set('f-pods',pods/podTarget*100,pods<podTarget);
        drawSpark();
      }
      function upt(){ const s=Math.floor((Date.now()-start)/1000), p=n=>String(n).padStart(2,'0');
        $('m-up').textContent=`uptime ${Math.floor(s/86400)}d ${p(Math.floor(s%86400/3600))}:${p(Math.floor(s%3600/60))}:${p(s%60)}`; }
      drawSpark(); tick(); setInterval(tick,1600); setInterval(upt,1000);
    })();

    // Sticky pill nav: show after hero + scrollspy active link
    (function(){
      const nav=document.getElementById('nav'); if(!nav) return;
      const links=[...nav.querySelectorAll('a')];
      const map={}; links.forEach(a=>{ map[a.getAttribute('href').slice(1)]=a; });
      links.forEach(a=>a.addEventListener('click',ev=>{ const t=document.querySelector(a.getAttribute('href'));
        if(t){ ev.preventDefault(); t.scrollIntoView({behavior:'smooth', block:'center'}); } }));  // center the planet so its block pops out
      const hud=document.getElementById('hud');
      const onScroll=()=>{ const past=window.scrollY > innerHeight*0.55;
        nav.classList.toggle('show', past);
        if(hud) hud.classList.toggle('hidden', past); };
      addEventListener('scroll', onScroll, {passive:true}); onScroll();
      const sections=[...document.querySelectorAll('.content section[id]')];
      if('IntersectionObserver' in window){
        const spy=new IntersectionObserver(es=>{ es.forEach(e=>{ if(e.isIntersecting){
          links.forEach(a=>a.classList.remove('active')); const a=map[e.target.id]; if(a) a.classList.add('active'); } }); },
          {rootMargin:'-45% 0px -50% 0px', threshold:0});
        sections.forEach(s=>spy.observe(s));
      }
    })();

    // Depth zoom: cards scale + fade by proximity to viewport center (like the planets);
    // click a card's empty space to bring it into focus. Hero photo card zooms too.
    (function(){
      if(matchMedia('(prefers-reduced-motion:reduce)').matches) return;
      const hero=document.querySelector('.hero .card');
      const cards=[...document.querySelectorAll('.content section .card')];
      if(!hero && !cards.length) return;
      // block is shrunk into its planet (tiny + invisible) when off-center, and pops out to full when the planet is centered
      const MINS=0.06, MINO=0;
      function focusOf(rect){
        const vc=innerHeight/2, cc=rect.top+rect.height/2;        // distance of the card's center from viewport center
        return 1 - Math.min(Math.abs(cc-vc)/(innerHeight*0.5), 1); // 1 = centered on its planet, 0 = far
      }
      const smooth=f=>f*f*(3-2*f);                                 // ease so it pops rather than creeps
      function apply(el,isHero){
        const e=smooth(focusOf(el.getBoundingClientRect()));
        el.style.opacity=(MINO+(1-MINO)*e).toFixed(3);
        const s=(MINS+(1-MINS)*e).toFixed(3);
        if(isHero){ el.style.setProperty('--z',s); }
        else { el.style.transform='scale('+s+')'; el.style.pointerEvents = e<0.3?'none':'auto'; }  // grows out of the planet (origin = planet behind it)
      }
      let ticking=false;
      function update(){ ticking=false; if(hero) apply(hero,true); cards.forEach(c=>apply(c,false)); }
      function onScroll(){ if(!ticking){ ticking=true; requestAnimationFrame(update); } }
      addEventListener('scroll', onScroll, {passive:true});
      addEventListener('resize', onScroll, {passive:true});
      cards.forEach(c=>c.addEventListener('click', e=>{
        if(e.target.closest('a,button,input,textarea,select,.chip')) return;
        c.scrollIntoView({behavior:'smooth', block:'center'});
      }));
      update();
    })();

    // Skill explainer: hover or tap a skill chip for a plain-English definition
    (function(){
      const EX={
        "AWS":"Amazon Web Services — the biggest cloud provider. You rent computing power, storage and databases over the internet instead of buying physical servers.",
        "Azure":"Microsoft's cloud platform — like AWS, it lets you run apps and store data on Microsoft's servers.",
        "Kubernetes":"A system that runs and manages lots of app 'containers' for you — automatically restarting, scaling and connecting them. Often shortened to 'K8s'.",
        "Helm":"A package manager for Kubernetes — like an app-store installer that bundles all the files needed to deploy an app with one command.",
        "Docker":"A tool that packages an app plus everything it needs into a 'container' so it runs the same way on any computer.",
        "Karpenter":"Automatically adds or removes servers in a Kubernetes cluster based on demand, so you only pay for what you actually use.",
        "Kustomize":"Lets you reuse the same Kubernetes config across environments (dev, staging, prod) with small tweaks instead of copy-paste.",
        "NGINX Ingress":"The 'front door' that routes incoming web traffic to the right app inside a Kubernetes cluster.",
        "HPA":"Horizontal Pod Autoscaler — automatically runs more copies of an app when it gets busy, and fewer when it's quiet.",
        "KEDA":"Scales apps up or down based on real events (like messages waiting in a queue), even down to zero when there's nothing to do.",
        "Rancher":"A dashboard for managing many Kubernetes clusters from one place.",
        "Istio":"A 'service mesh' — it manages, secures and monitors the network traffic between the many small services that make up an app.",
        "Envoy":"A smart proxy that sits in front of services to route, balance and secure their traffic (it's the engine inside Istio).",
        "Kubernetes Gateway API":"A newer, standard way to define how outside traffic is allowed into a Kubernetes cluster.",
        "Cloudflare Tunnel":"Safely exposes a website to the internet without opening any ports — traffic flows through Cloudflare's secure tunnel.",
        "NetworkPolicy":"Firewall rules for Kubernetes — controls which apps are allowed to talk to which.",
        "Terraform":"Lets you build cloud infrastructure by writing code, so your whole setup is repeatable and version-controlled ('infrastructure as code').",
        "GitHub Actions":"Automation built into GitHub — it can test, build and deploy your code automatically whenever you push a change.",
        "GitLab CI":"GitLab's built-in automation for testing and deploying code (similar to GitHub Actions).",
        "ArgoCD":"Keeps what's running in Kubernetes exactly matching what's written in Git, and deploys changes automatically ('GitOps').",
        "FluxCD":"Another GitOps tool — it watches your Git repo and automatically applies any changes to your cluster.",
        "Prometheus":"Collects metrics (numbers like CPU use or request counts) from your systems so you can track their health over time.",
        "Grafana":"Turns metrics into clear dashboards and graphs so you can see how systems are doing at a glance.",
        "Thanos":"Extends Prometheus to store metrics long-term and combine many clusters into one view.",
        "Fluentd":"Collects logs from everywhere and ships them to one place for searching and analysis.",
        "Elasticsearch":"A search engine and database that stores huge amounts of logs and lets you search them instantly.",
        "Kibana":"A visual dashboard for exploring and searching the logs stored in Elasticsearch.",
        "CloudWatch":"AWS's built-in monitoring — collects logs, metrics and alarms for things running on AWS.",
        "Cert-Manager":"Automatically gets and renews the SSL certificates that give websites their padlock and 'https'.",
        "AWS Secrets Manager":"A secure vault for passwords, API keys and other secrets, so they're never written in plain code.",
        "Sealed Secrets":"Lets you safely store encrypted secrets in Git — only your cluster can unlock them.",
        "Secrets Store CSI Driver":"Delivers secrets from a vault straight into apps running in Kubernetes, without hardcoding them.",
        "IRSA":"IAM Roles for Service Accounts — gives each Kubernetes app only the exact AWS permissions it needs, nothing more.",
        "External DNS":"Automatically creates DNS records (web addresses) for your services so people can reach them by name.",
        "MongoDB":"A 'NoSQL' database that stores data as flexible documents instead of rigid tables.",
        "DynamoDB":"Amazon's fast, fully-managed NoSQL database that scales automatically.",
        "MySQL":"A popular traditional database that stores data in tables of rows and columns.",
        "Linux":"The open-source operating system that runs most servers and cloud systems.",
        "Bash":"The command-line language used to type commands and write scripts on Linux and Mac.",
        "Python":"A beginner-friendly programming language widely used for automation, scripts and tools.",
        "SLA/SLO":"Reliability promises — an SLA is the guarantee made to customers; an SLO is the internal target (e.g. 99.9% uptime).",
        "Incident Response":"The process of quickly detecting, fixing and learning from outages or system problems.",
        "API Systems":"APIs let different pieces of software talk to each other; this is building and running the services that expose them.",
        "Jira":"A tool teams use to track tasks, bugs and project progress.",
        "Confluence":"A team wiki for writing and sharing documentation and notes.",
        "GitHub Copilot":"An AI assistant inside your code editor that suggests and writes code as you type.",
        "Claude Code":"Anthropic's AI coding agent that can read a codebase and make changes from plain-English instructions.",
        "MCP-based automation":"MCP (Model Context Protocol) lets AI assistants safely connect to real tools and data to automate tasks.",
        "LLMs":"Large Language Models — the AI (like Claude or GPT) trained on huge amounts of text to understand and generate language.",
        "Prompt Engineering":"The skill of writing clear instructions so an AI gives you the best, most accurate results."
      };
      const pop=document.getElementById('skpop'); const chips=[...document.querySelectorAll('#skills .chip')];
      if(!pop||!chips.length) return;
      const keyOf=t=>t.split('(')[0].trim();
      let hideT, active=null;
      function show(chip){
        const e=EX[keyOf(chip.textContent)]; if(!e) return;
        chips.forEach(c=>c.classList.remove('lit')); chip.classList.add('lit'); active=chip;
        pop.innerHTML='<b>'+chip.textContent+'</b>'+e; pop.classList.add('show');
        const r=chip.getBoundingClientRect(), pw=Math.min(290, innerWidth-20);
        let x=Math.max(10, Math.min(r.left, innerWidth-pw-10));
        let y=r.bottom+8; if(y+pop.offsetHeight>innerHeight-10) y=Math.max(10, r.top-8-pop.offsetHeight);
        pop.style.left=x+'px'; pop.style.top=y+'px';
      }
      function hide(){ pop.classList.remove('show'); if(active){active.classList.remove('lit'); active=null;} }
      chips.forEach(c=>{
        c.addEventListener('mouseenter',()=>{ clearTimeout(hideT); show(c); });
        c.addEventListener('mouseleave',()=>{ hideT=setTimeout(hide,140); });
        c.addEventListener('click',e=>{ e.stopPropagation(); (active===c)?hide():show(c); });
      });
      pop.addEventListener('mouseenter',()=>clearTimeout(hideT));
      pop.addEventListener('mouseleave',()=>{ hideT=setTimeout(hide,140); });
      addEventListener('click',e=>{ if(!e.target.closest('#skills .chip') && !e.target.closest('#skpop')) hide(); }, true);
      addEventListener('scroll',()=>{ if(active) hide(); }, {passive:true});
    })();
    </script>
    </body>
    </html>
