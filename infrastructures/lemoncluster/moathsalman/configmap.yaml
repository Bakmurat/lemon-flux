    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,1,8000);
    camera.position.set(0,230,560); camera.lookAt(0,0,0);
    const renderer=new THREE.WebGLRenderer({canvas:bg,antialias:true});
    renderer.setSize(innerWidth,innerHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setClearColor(0x01030c,1);

    function cvs(w,h){ const c=document.createElement('canvas'); c.width=w; c.height=h; return [c,c.getContext('2d')]; }
    function earthTex(){ const [c,x]=cvs(512,256);
      const g=x.createLinearGradient(0,0,0,256); g.addColorStop(0,'#0a3568'); g.addColorStop(.5,'#0e4d94'); g.addColorStop(1,'#0a3568');
      x.fillStyle=g; x.fillRect(0,0,512,256);
      function land(cx,cy,scale,col){ x.fillStyle=col;
        for(let i=0;i<80;i++){ const a=Math.random()*7, r=scale*(0.25+Math.random()*0.9);
          const px=cx+Math.cos(a)*scale*Math.random()*1.7, py=cy+Math.sin(a)*scale*0.9*Math.random()*1.7;
          x.beginPath(); x.ellipse(px,py,r,r*(0.6+Math.random()*0.6),Math.random(),0,7); x.fill(); } }
      land(120,95,20,'#2f7d46'); land(150,150,15,'#3c8f52');     // Africa/Europe
      land(360,110,22,'#357f48'); land(335,175,14,'#2f7d46');    // Americas
      land(440,85,15,'#4a8a4f'); land(75,185,10,'#6b8f4a');      // Asia/Oceania
      x.globalAlpha=.45; x.fillStyle='#b89b5e';
      for(let i=0;i<44;i++){ x.beginPath(); x.ellipse(Math.random()*512,40+Math.random()*176,3+Math.random()*8,2+Math.random()*5,0,0,7); x.fill(); }
      x.globalAlpha=1;
      x.fillStyle='rgba(238,247,255,.94)'; x.fillRect(0,0,512,13); x.fillRect(0,243,512,13);
      x.fillStyle='rgba(238,247,255,.45)'; x.fillRect(0,13,512,9); x.fillRect(0,234,512,9);
      return new THREE.CanvasTexture(c); }
    function cloudTex(){ const [c,x]=cvs(512,256); x.clearRect(0,0,512,256); x.fillStyle='#ffffff';
      for(let i=0;i<55;i++){ const cx=Math.random()*512, cy=Math.random()*256, s=6+Math.random()*24; x.globalAlpha=.14+Math.random()*0.45;
        for(let j=0;j<6;j++){ x.beginPath(); x.ellipse(cx+(Math.random()-.5)*s*2,cy+(Math.random()-.5)*s,s*(0.4+Math.random()*0.6),s*(0.3+Math.random()*0.4),0,0,7); x.fill(); } }
      x.globalAlpha=1; return new THREE.CanvasTexture(c); }
    function haloTex(){ const [c,x]=cvs(128,128); const g=x.createRadialGradient(64,64,12,64,64,64);
      g.addColorStop(0,'rgba(255,255,255,.85)'); g.addColorStop(.38,'rgba(255,255,255,.32)'); g.addColorStop(1,'rgba(255,255,255,0)');
      x.fillStyle=g; x.fillRect(0,0,128,128); return new THREE.CanvasTexture(c); }
    const HALO=haloTex();
    function bandTex(cols){ const [c,x]=cvs(128,128); const n=cols.length; for(let y=0;y<128;y++){ const col=cols[Math.floor((y/128)*n)%n]; x.fillStyle=col; x.fillRect(0,y,128,1);}
      x.globalAlpha=.25; for(let i=0;i<40;i++){x.fillStyle=cols[Math.floor(Math.random()*n)];x.fillRect(0,Math.random()*128,128,1+Math.random()*2);} x.globalAlpha=1; return new THREE.CanvasTexture(c); }
    function mottleTex(base,spot){ const [c,x]=cvs(128,128); x.fillStyle=base; x.fillRect(0,0,128,128);
      x.fillStyle=spot; for(let i=0;i<40;i++){x.beginPath();x.arc(Math.random()*128,Math.random()*128,2+Math.random()*9,0,7);x.fill();} return new THREE.CanvasTexture(c); }

    function makeGalaxy(count,radius,branches,spin,rnd,pow,cIn,cOut,size,op){
      const pos=new Float32Array(count*3),col=new Float32Array(count*3);
      const a=new THREE.Color(cIn),b=new THREE.Color(cOut);
      for(let i=0;i<count;i++){const i3=i*3;
        const r=Math.pow(Math.random(),1.5)*radius, branch=(i%branches)/branches*Math.PI*2, s=r*spin;
        const rx=Math.pow(Math.random(),pow)*(Math.random()<.5?1:-1)*rnd*r, ry=Math.pow(Math.random(),pow)*(Math.random()<.5?1:-1)*rnd*r*0.3, rz=Math.pow(Math.random(),pow)*(Math.random()<.5?1:-1)*rnd*r;
        pos[i3]=Math.cos(branch+s)*r+rx; pos[i3+1]=ry; pos[i3+2]=Math.sin(branch+s)*r+rz;
        const c=a.clone().lerp(b,r/radius); col[i3]=c.r;col[i3+1]=c.g;col[i3+2]=c.b; }
      const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.BufferAttribute(pos,3)); g.setAttribute('color',new THREE.BufferAttribute(col,3));
      return new THREE.Points(g,new THREE.PointsMaterial({size,depthWrite:false,vertexColors:true,blending:THREE.AdditiveBlending,transparent:true,opacity:op}));
    }
    const milky=makeGalaxy(9000,2600,5,0.0016,0.32,2.4,0xfff0d0,0x5577ff,4,0.5);
    milky.rotation.x=0.9; milky.rotation.z=0.35; milky.position.set(-400,-600,-1800); scene.add(milky);
    const sc=3000,sp=new Float32Array(sc*3);
    for(let i=0;i<sc*3;i++) sp[i]=(Math.random()-0.5)*6000;
    const sg=new THREE.BufferGeometry(); sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
    scene.add(new THREE.Points(sg,new THREE.PointsMaterial({size:1.5,color:0xbcccff,transparent:true,opacity:.75})));

    scene.add(new THREE.AmbientLight(0x223355,0.35));
    scene.add(new THREE.PointLight(0xfff0c0,3,4000));
    const sun=new THREE.Mesh(new THREE.SphereGeometry(34,40,40),new THREE.MeshBasicMaterial({color:0xffcf5a}));
    sun.userData={name:'The Sun',skill:'Core Platform'}; scene.add(sun);
    function glowTex(){ const [c,x]=cvs(256,256); const gr=x.createRadialGradient(128,128,0,128,128,128);
      gr.addColorStop(0,'rgba(255,240,190,1)');gr.addColorStop(.3,'rgba(255,200,110,.7)');gr.addColorStop(1,'rgba(255,170,60,0)');
      x.fillStyle=gr;x.fillRect(0,0,256,256); return new THREE.CanvasTexture(c); }
    const sunGlow=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex(),blending:THREE.AdditiveBlending,transparent:true,depthWrite:false}));
    sunGlow.scale.set(150,150,1); scene.add(sunGlow);

    const PL=[
      {name:'Mercury',skill:'Bash',    rad:66, size:3,  tex:mottleTex('#9a8478','#6b5b52'), spd:1.6,  atmo:'#c9b8a8'},
      {name:'Venus',  skill:'Docker',  rad:92, size:5,  tex:mottleTex('#d9a066','#c98a4b'), spd:1.15, atmo:'#f5dea0'},
      {name:'Earth',  skill:'Kubernetes',rad:122,size:6.2,tex:earthTex(), spd:1.0, moon:true, atmo:'#6db3ff'},
      {name:'Mars',   skill:'Terraform',rad:152,size:4.4,tex:mottleTex('#c1440e','#8a2f0a'), spd:0.8,  atmo:'#e0a080'},
      {name:'Jupiter',skill:'AWS',     rad:214,size:16, tex:bandTex(['#c9a97e','#a5764c','#e0c9a6','#8a5a35']), spd:0.44, atmo:'#e6cfa8'},
      {name:'Saturn', skill:'Istio',   rad:276,size:13, tex:bandTex(['#e6d3a3','#c9b483','#f0e3bf']), spd:0.31, ring:true, atmo:'#efe3c0'},
      {name:'Uranus', skill:'Prometheus',rad:326,size:9,tex:mottleTex('#8fe0e6','#7fd0d6'), spd:0.22, atmo:'#bff0f4'},
      {name:'Neptune',skill:'FluxCD',  rad:372,size:9,  tex:mottleTex('#3b6fe0','#2f5bc0'), spd:0.17, atmo:'#7fa8ff'},
    ];
    const planets=[]; const hoverable=[sun];
    const orbitMat=new THREE.LineBasicMaterial({color:0x3b4a66,transparent:true,opacity:.4});
    PL.forEach(p=>{
      const mesh=new THREE.Mesh(new THREE.SphereGeometry(p.size,48,48),new THREE.MeshPhongMaterial({map:p.tex,shininess:p.name==='Earth'?20:6,specular:new THREE.Color(p.name==='Earth'?0x3a6ea5:0x111418)}));
      mesh.userData={name:p.name,skill:p.skill}; scene.add(mesh); hoverable.push(mesh);
      const halo=new THREE.Sprite(new THREE.SpriteMaterial({map:HALO,color:new THREE.Color(p.atmo||'#88aaff'),blending:THREE.AdditiveBlending,transparent:true,opacity:.5,depthWrite:false}));
      halo.scale.set(p.size*3.4,p.size*3.4,1); mesh.add(halo);
      let clouds=null;
      if(p.name==='Earth'){ clouds=new THREE.Mesh(new THREE.SphereGeometry(p.size*1.02,48,48),new THREE.MeshPhongMaterial({map:cloudTex(),transparent:true,opacity:.5,depthWrite:false})); mesh.add(clouds); }
      const pts=[]; for(let a=0;a<=64;a++){const t=a/64*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(t)*p.rad,0,Math.sin(t)*p.rad));}
      scene.add(new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(pts),orbitMat));
      if(p.ring){ const rg=new THREE.RingGeometry(p.size*1.4,p.size*2.3,48); rg.rotateX(Math.PI/2);
        mesh.add(new THREE.Mesh(rg,new THREE.MeshBasicMaterial({color:0xd9c9a0,side:THREE.DoubleSide,transparent:true,opacity:.7}))); mesh.rotation.z=0.4; }
      let moon=null;
      if(p.moon){ moon=new THREE.Mesh(new THREE.SphereGeometry(1.8,16,16),new THREE.MeshStandardMaterial({color:0xbfc3c9,roughness:1})); scene.add(moon); }
      planets.push({...p,mesh,moon,clouds,angle:Math.random()*Math.PI*2,moonAngle:0});
    });

    const ray=new THREE.Raycaster(), mouse=new THREE.Vector2(); let mx=0,my=0;
    const tip=document.getElementById('tip'), bgc=document.getElementById('bg');
    addEventListener('mousemove',e=>{ mx=e.clientX/innerWidth-0.5; my=e.clientY/innerHeight-0.5;
      mouse.x=(e.clientX/innerWidth)*2-1; mouse.y=-(e.clientY/innerHeight)*2+1;
      ray.setFromCamera(mouse,camera); const hit=ray.intersectObjects(hoverable)[0];
      if(hit){ const d=hit.object.userData; tip.innerHTML=d.name+'<small>'+d.skill+'</small>'; tip.style.left=e.clientX+'px'; tip.style.top=e.clientY+'px'; tip.style.opacity=1; bgc.style.cursor='pointer'; }
      else { tip.style.opacity=0; bgc.style.cursor='crosshair'; }
    });
    const shooters=[];
    bgc.addEventListener('click',()=>{
      const start=new THREE.Vector3((Math.random()-0.5)*1400,300+Math.random()*300,(Math.random()-0.5)*400-200);
      const vel=new THREE.Vector3(-1-Math.random(),-0.5-Math.random()*0.4,0.2).normalize().multiplyScalar(18);
      const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints([start.clone(),start.clone()]),new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:1}));
      scene.add(line); shooters.push({line,pos:start,vel,life:55});
    });

    // --- Scroll-driven camera fly-through: each section rides a specific planet ---
    const byName=n=>planets.find(p=>p.name===n);
    const bodyPos=b=>b.isMesh?b.position:b.mesh.position;
    // d = camera distance from the planet (smaller = planet fills more of the backdrop behind the card)
    const STOPS=[
      {sel:'#summary',    body:sun,               d:150, h:28},
      {sel:'#skills',     body:byName('Earth'),   d:20,  h:4 },
      {sel:'#experience', body:byName('Jupiter'), d:40,  h:9 },
      {sel:'#projects',   body:byName('Saturn'),  d:52,  h:11},
      {sel:'#certs',      body:byName('Neptune'), d:22,  h:5 },
    ].map(s=>({...s, el:document.querySelector(s.sel)}));
    const HERO_POS=new THREE.Vector3(0,230,560), HERO_LOOK=new THREE.Vector3(0,0,0);
    const _cp=new THREE.Vector3(), _cl=new THREE.Vector3();
    const _dir=new THREE.Vector3(), _right=new THREE.Vector3(), UP=new THREE.Vector3(0,1,0);
    function focusW(el){ if(!el) return 0; const r=el.getBoundingClientRect(), vc=innerHeight/2;
      const d = vc<r.top ? r.top-vc : (vc>r.bottom ? vc-r.bottom : 0);
      return Math.max(0, 1 - d/(innerHeight*0.6)); }
    function cameraTarget(){
      const wHero=Math.max(0, 1 - scrollY/(innerHeight*0.5));
      const ws=STOPS.map(s=>focusW(s.el));
      const total=wHero+ws.reduce((a,b)=>a+b,0);
      if(total<1e-4){ _cp.copy(HERO_POS); _cl.copy(HERO_LOOK); return; }
      _cp.copy(HERO_POS).multiplyScalar(wHero); _cl.copy(HERO_LOOK).multiplyScalar(wHero);
      STOPS.forEach((s,i)=>{ const w=ws[i]; if(w<=0) return; const b=bodyPos(s.body);
        let cx,cz;
        if(s.body===sun){ cx=b.x; cz=b.z+s.d; }                 // sun is self-lit — any side works
        else { const len=Math.hypot(b.x,b.z)||1, k=1-s.d/len; cx=b.x*k; cz=b.z*k; } // sit between planet and sun to see its lit face
        _cp.x+=cx*w; _cp.y+=(b.y+s.h)*w; _cp.z+=cz*w;
        _cl.x+=b.x*w; _cl.y+=b.y*w; _cl.z+=b.z*w; });
      _cp.multiplyScalar(1/total); _cl.multiplyScalar(1/total);
    }

    let t=0;
    addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
    (function loop(){ requestAnimationFrame(loop); const boost=window.speedBoost||1; t+=0.004*boost;
      milky.rotation.y+=0.0002*boost; sun.rotation.y+=0.002*boost;
      planets.forEach(p=>{ p.angle+=0.004*p.spd*boost; const x=Math.cos(p.angle)*p.rad, z=Math.sin(p.angle)*p.rad;
        p.mesh.position.set(x,0,z); p.mesh.rotation.y+=0.01; if(p.clouds) p.clouds.rotation.y+=0.004*boost;
        if(p.moon){ p.moonAngle+=0.05; p.moon.position.set(x+Math.cos(p.moonAngle)*14,Math.sin(p.moonAngle)*4,z+Math.sin(p.moonAngle)*14); } });
      cameraTarget();
      camera.position.x+=(_cp.x + mx*55 - camera.position.x)*0.09;
      camera.position.y+=(_cp.y - my*35 - camera.position.y)*0.09;
      camera.position.z+=(_cp.z - camera.position.z)*0.09;
      camera.lookAt(_cl);
      for(let i=shooters.length-1;i>=0;i--){const s=shooters[i]; s.pos.add(s.vel);
        s.line.geometry.setFromPoints([s.pos.clone(),s.pos.clone().sub(s.vel.clone().multiplyScalar(2.5))]);
        s.line.material.opacity=s.life/55; if(--s.life<=0){scene.remove(s.line); shooters.splice(i,1);} }
      renderer.render(scene,camera);
    })();
    </script>

    <script>
    // ---------- Cloud Trivia: 50 easy questions, 10 random per game ----------
    const POOL=[
      {cat:"AWS",q:"Which AWS service provides a managed Kubernetes control plane?",opts:["ECS","EKS","Lambda","Lightsail"],a:1,e:"EKS (Elastic Kubernetes Service) runs and manages Kubernetes for you."},
