apiVersion: v1
kind: ConfigMap
metadata:
  name: moathsalman-site
  namespace: moathsalman
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Moath Salman — Platform Engineer</title>
    <style>
      :root { --sky:#38bdf8; --indigo:#818cf8; --indigo2:#a5b4fc; --text:#e2e8f0; --muted:#94a3b8; --card:rgba(8,12,30,.6); }
      * { box-sizing:border-box; margin:0; padding:0; }
      html { scroll-behavior:smooth; }
      body { background:#01030c; color:var(--text); line-height:1.55;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
      #bg { position:fixed; inset:0; z-index:0; cursor:crosshair; }
      .content { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:0 1.25rem; pointer-events:none; }
      .card, a, button, .content .chip { pointer-events:auto; }
      a { color:var(--indigo2); text-decoration:none; }
      a:hover { color:#c7d2fe; }
      .card { background:var(--card); backdrop-filter:blur(12px);
        border:1px solid rgba(129,140,248,.28); border-radius:20px;
        box-shadow:0 24px 60px rgba(0,0,0,.5); padding:2rem 2rem; margin:1.4rem 0; }
      /* HERO */
      .hero { min-height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; padding:3rem 0 2rem; }
      .hero .card { animation:float 6s ease-in-out infinite; max-width:560px; }
      @keyframes float { 0%,100%{transform:translateY(0) scale(var(--z,1))} 50%{transform:translateY(-12px) scale(var(--z,1))} }
      .avatar { width:150px; height:150px; border-radius:50%; margin:0 auto 1.3rem; overflow:hidden;
        border:3px solid rgba(129,140,248,.6); box-shadow:0 14px 45px rgba(129,140,248,.45); }
      .avatar img { width:100%; height:100%; object-fit:cover; object-position:center 22%; display:block; }
      h1 { font-size:2.2rem; letter-spacing:-.02em; }
      .role { color:var(--indigo2); font-size:1.15rem; margin:.35rem 0 .9rem; }
      .badge { display:inline-block; padding:.35rem .85rem; border-radius:999px; font-size:.82rem; font-weight:600;
        color:#bbf7d0; background:rgba(34,197,94,.14); border:1px solid rgba(34,197,94,.4); margin-bottom:1.1rem; }
      .contact { display:flex; flex-wrap:wrap; gap:.5rem 1.1rem; justify-content:center; font-size:.92rem; color:var(--muted); }
      .contact a, .contact span { color:var(--muted); }
      .contact a:hover { color:var(--indigo2); }
      .btns { margin-top:1.4rem; display:flex; gap:.7rem; justify-content:center; flex-wrap:wrap; }
      .btn { padding:.65rem 1.35rem; border-radius:11px; font-weight:600; transition:.15s; }
      .btn-primary { background:var(--indigo); color:#0f172a; box-shadow:0 8px 24px rgba(129,140,248,.4); }
      .btn-primary:hover { background:var(--indigo2); color:#0f172a; }
      .btn-ghost { border:1px solid rgba(148,163,184,.5); color:var(--text); }
      .btn-ghost:hover { border-color:var(--indigo); color:var(--indigo2); }
      /* SECTIONS */
      section h2 { font-size:1.35rem; margin-bottom:1rem; color:#fff; display:flex; align-items:center; gap:.6rem; }
      section h2::before { content:""; width:6px; height:22px; border-radius:3px; background:linear-gradient(var(--sky),var(--indigo)); display:inline-block; }
      .summary p { color:#cbd5e1; }
      .skill-group { margin-bottom:1rem; } .skill-group:last-child { margin-bottom:0; }
      .skill-label { font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--indigo2); margin-bottom:.5rem; font-weight:600; }
      .chips { display:flex; flex-wrap:wrap; gap:.45rem; }
      .chip { padding:.32rem .7rem; border-radius:8px; font-size:.85rem; color:#e2e8f0; background:rgba(56,189,248,.1); border:1px solid rgba(56,189,248,.25); }
      .job { margin-bottom:1.6rem; } .job:last-child { margin-bottom:0; }
      .job-head { display:flex; justify-content:space-between; flex-wrap:wrap; gap:.2rem; margin-bottom:.5rem; }
      .job-title { font-weight:700; font-size:1.05rem; } .job-title .co { color:var(--indigo2); }
      .job-meta { color:var(--muted); font-size:.88rem; text-align:right; }
      .job ul { list-style:none; padding:0; }
      .job li { position:relative; padding-left:1.2rem; margin-bottom:.5rem; color:#cbd5e1; font-size:.94rem; }
      .job li::before { content:"▸"; position:absolute; left:0; color:var(--sky); }
      .certs { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:.7rem; }
      .cert { padding:.7rem .9rem; border-radius:10px; background:rgba(129,140,248,.08); border:1px solid rgba(129,140,248,.22); font-size:.9rem; }
      footer { text-align:center; color:#64748b; font-size:.85rem; padding:2.5rem 1rem 3rem; position:relative; z-index:1; }
      footer strong { color:var(--muted); }
      /* solar tooltip */
      #tip { position:fixed; z-index:5; padding:.4rem .75rem; border-radius:9px; font-size:.85rem; font-weight:700;
        background:rgba(129,140,248,.96); color:#0b1020; pointer-events:none; opacity:0; transition:opacity .12s;
        transform:translate(-50%,-150%); white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,.4); }
      #tip small { display:block; font-weight:500; color:#1e1b4b; opacity:.8; }
      /* Cloud Trivia */
      .btn-trivia { border:0; cursor:pointer; background:linear-gradient(135deg,var(--sky),var(--indigo)); color:#0b1020; box-shadow:0 8px 24px rgba(56,189,248,.4); }
      .btn-trivia:hover { filter:brightness(1.08); }
      #quiz { position:fixed; inset:0; z-index:20; display:none; place-items:center; padding:1.5rem; background:rgba(1,3,12,.85); backdrop-filter:blur(6px); }
      #quiz .qcard { width:100%; max-width:560px; background:rgba(10,15,35,.96); border:1px solid rgba(129,140,248,.35); border-radius:20px; padding:1.8rem 1.8rem 2rem; box-shadow:0 30px 90px rgba(0,0,0,.75); }
      #quiz .qtop { display:flex; justify-content:space-between; align-items:center; font-size:.85rem; color:#94a3b8; margin-bottom:.4rem; }
      #quiz .qtop b { color:var(--indigo2); } #quiz .streak { color:#f59e0b; }
      #quiz .bar { height:6px; border-radius:99px; background:#1e293b; overflow:hidden; margin-bottom:1.2rem; }
      #quiz .bar > div { height:100%; background:linear-gradient(90deg,var(--sky),var(--indigo)); width:0; transition:width .3s; }
      #quiz .cat { display:inline-block; font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:#0b1020; background:var(--indigo2); padding:.15rem .55rem; border-radius:6px; margin-bottom:.7rem; font-weight:700; }
      #quiz .q { font-size:1.18rem; font-weight:600; margin-bottom:1.2rem; line-height:1.4; }
      #quiz .opts { display:grid; gap:.6rem; }
      #quiz .opt { text-align:left; padding:.8rem 1rem; border-radius:12px; border:1px solid rgba(148,163,184,.3); background:rgba(30,41,59,.5); color:#e2e8f0; cursor:pointer; font-size:.97rem; transition:.12s; }
      #quiz .opt:hover:not(:disabled) { border-color:var(--indigo); background:rgba(129,140,248,.14); }
      #quiz .opt.correct { border-color:#22c55e; background:rgba(34,197,94,.18); }
      #quiz .opt.wrong { border-color:#ef4444; background:rgba(239,68,68,.18); }
      #quiz .explain { margin-top:1rem; font-size:.9rem; color:#cbd5e1; padding:.75rem .9rem; border-radius:10px; background:rgba(56,189,248,.08); border:1px solid rgba(56,189,248,.22); display:none; }
      #quiz .nextrow { margin-top:1.1rem; display:flex; justify-content:space-between; align-items:center; }
      #quiz .nextrow button { padding:.6rem 1.3rem; border-radius:10px; border:0; cursor:pointer; font-weight:700; background:var(--indigo); color:#0b1020; }
      #quiz .closeb { background:none; border:0; color:#64748b; cursor:pointer; font-size:.9rem; }
      #quiz .result { text-align:center; }
      #quiz .result .rank { font-size:1.3rem; color:var(--indigo2); margin-bottom:.4rem; }
      #quiz .result .big { font-size:2.6rem; font-weight:800; margin:.3rem 0; }
      #quiz .result p { color:#94a3b8; margin-bottom:1.3rem; }
      #quiz .playagain { padding:.7rem 1.5rem; border-radius:11px; border:0; cursor:pointer; font-weight:700; background:linear-gradient(135deg,var(--sky),var(--indigo)); color:#0b1020; }
      /* easter eggs: typing cursor, hyperdrive banner, terminal */
      .cursor { display:inline-block; margin-left:2px; color:var(--indigo2); animation:blink 1s step-end infinite; }
      @keyframes blink { 50%{opacity:0} }
      #banner { position:fixed; top:24%; left:50%; transform:translateX(-50%); z-index:30; padding:.7rem 1.6rem; border-radius:12px;
        font-weight:800; font-size:1.3rem; letter-spacing:.05em; color:#0b1020; background:linear-gradient(135deg,#38bdf8,#a5b4fc);
        box-shadow:0 12px 50px rgba(56,189,248,.6); opacity:0; pointer-events:none; transition:opacity .3s; text-align:center; }
      #term-btn { position:fixed; bottom:18px; right:18px; z-index:15; font-family:ui-monospace,Menlo,monospace; cursor:pointer;
        padding:.5rem .8rem; border-radius:10px; border:1px solid rgba(56,189,248,.4); background:rgba(10,15,35,.8); color:#5eead4; font-size:.85rem; backdrop-filter:blur(6px); }
      #term-btn:hover { border-color:#5eead4; }
      #term { position:fixed; inset:0; z-index:25; display:none; place-items:center; padding:1.5rem; background:rgba(1,3,12,.6); }
      #term .win { width:100%; max-width:680px; height:min(72vh,480px); display:flex; flex-direction:column;
        background:#1a1a1f; border:1px solid rgba(255,255,255,.09); border-radius:12px; overflow:hidden; box-shadow:0 30px 90px rgba(0,0,0,.85); }
      #term .bar { display:flex; align-items:center; gap:.55rem; padding:.7rem .95rem; border-bottom:1px solid rgba(255,255,255,.07); }
      #term .bar .brand { color:#d97757; font-weight:700; font-family:ui-monospace,Menlo,monospace; font-size:.85rem; }
      #term .bar .path { color:#7d7d87; font-size:.8rem; font-family:ui-monospace,Menlo,monospace; }
      #term .bar .hint { margin-left:auto; color:#5a5a63; font-size:.74rem; font-family:ui-monospace,Menlo,monospace; cursor:pointer; }
      #term .bar .hint:hover { color:#b3a0ff; }
      #term .body { flex:1; overflow-y:auto; padding:.9rem 1.05rem; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.85rem; line-height:1.55; color:#d0d0d6; white-space:pre-wrap; }
      #term .body .ok{color:#7bd88f} #term .body .dim{color:#6a6a73} #term .body .warn{color:#e0a45e}
      #term .promptbox { margin:.15rem .85rem .5rem; display:flex; align-items:center; gap:.55rem; padding:.55rem .8rem;
        border:1px solid rgba(179,160,255,.32); border-radius:9px; background:rgba(179,160,255,.05); font-family:ui-monospace,Menlo,monospace; font-size:.85rem; }
      #term .promptbox .p { color:#b3a0ff; font-weight:700; }
      #term input { flex:1; background:none; border:0; outline:0; color:#ececf0; font-family:inherit; font-size:inherit; }
      #term input::placeholder { color:#55555e; }
      #term .statusbar { display:flex; gap:.5rem; align-items:center; padding:0 1rem .65rem; font-family:ui-monospace,Menlo,monospace; font-size:.72rem; color:#6a6a73; }
      #term .statusbar .acc { color:#b3a0ff; } #term .statusbar .sh { color:#7bd88f; }
      /* LIVE CLUSTER HUD */
      #hud { position:fixed; top:16px; left:16px; z-index:16; width:198px; font-family:ui-monospace,Menlo,monospace;
        background:rgba(6,10,24,.82); backdrop-filter:blur(10px); border:1px solid rgba(94,234,212,.28);
        border-radius:12px; box-shadow:0 18px 50px rgba(0,0,0,.55); overflow:hidden; transition:transform .3s ease, opacity .3s; }
      #hud.min { transform:translateY(calc(-100% + 34px)); }
      #hud.hidden { opacity:0; transform:translateX(-118%)!important; pointer-events:none; }
      #hud .hud-bar { display:flex; align-items:center; gap:.5rem; padding:.5rem .7rem; cursor:pointer;
        background:rgba(20,28,48,.7); border-bottom:1px solid rgba(94,234,212,.14); user-select:none; }
      #hud .live { width:8px; height:8px; border-radius:50%; background:#27c93f; box-shadow:0 0 8px #27c93f; animation:pulse 1.6s infinite; }
      @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.45;transform:scale(.7)} }
      #hud .hud-bar b { color:#cbd5e1; font-size:.78rem; letter-spacing:.02em; font-weight:600; }
      #hud .hud-bar .caret { margin-left:auto; color:#64748b; font-size:.7rem; transition:transform .3s; }
      #hud.min .caret { transform:rotate(180deg); }
      #hud .hud-body { padding:.6rem .75rem .7rem; display:flex; flex-direction:column; gap:.5rem; }
      #hud .row { font-size:.72rem; color:#94a3b8; }
      #hud .row .top { display:flex; justify-content:space-between; margin-bottom:.22rem; }
      #hud .row .val { color:#e2e8f0; font-weight:600; }
      #hud .row .val.g { color:#5eead4; }
      #hud .track { height:5px; border-radius:3px; background:rgba(148,163,184,.16); overflow:hidden; }
      #hud .fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#38bdf8,#818cf8); transition:width .8s ease, background .8s; }
      #hud .fill.warn { background:linear-gradient(90deg,#fbbf24,#f97316); }
      #hud canvas { width:100%; height:30px; display:block; }
      #hud .foot { font-size:.66rem; color:#475569; text-align:right; }
      /* STICKY PILL NAV */
      #nav { position:fixed; top:14px; left:50%; z-index:18; display:flex; align-items:center; gap:.15rem;
        padding:.35rem .45rem; background:rgba(6,10,24,.82); backdrop-filter:blur(12px);
        border:1px solid rgba(129,140,248,.25); border-radius:999px; box-shadow:0 14px 40px rgba(0,0,0,.5);
        transform:translateX(-50%) translateY(-160%); opacity:0; pointer-events:none;
        transition:transform .35s cubic-bezier(.2,.8,.2,1), opacity .35s ease; }
      #nav.show { transform:translateX(-50%) translateY(0); opacity:1; pointer-events:auto; }
      #nav a { color:var(--muted); font-size:.82rem; font-weight:600; padding:.4rem .85rem; border-radius:999px; transition:.15s; }
      #nav a:hover { color:var(--indigo2); background:rgba(129,140,248,.12); }
      #nav a.active { color:#0f172a; background:var(--indigo2); }
      section[id] { scroll-margin-top:82px; }
      /* DEPTH ZOOM — cards rise + fade in as you fly toward their planet */
      .content section .card { transform-origin:center center; will-change:transform,opacity; transition:opacity .25s ease; }
      .content section .card:hover { cursor:zoom-in; }
      .content section .card a, .content section .card button, .content section .card .chip { cursor:pointer; }
      .hero .card { will-change:transform,opacity; }
      /* embedded-in-planet look: translucent glass tinted with the planet's glow */
      #summary    .card { --pglow:255,207,90;  }
      #skills     .card { --pglow:95,168,255;  }
      #experience .card { --pglow:224,201,168; }
      #projects   .card { --pglow:230,211,163; }
      #certs      .card { --pglow:110,150,255; }
      .content section .card { background:rgba(6,10,26,.60); border:1px solid rgba(var(--pglow,129,140,248),.42);
        box-shadow:0 24px 60px rgba(0,0,0,.55), 0 0 90px -18px rgba(var(--pglow,129,140,248),.6); }
      /* each planet gets its own full screen; the block is centered so it can pop out of the planet behind it */
      .content section { min-height:100vh; display:flex; flex-direction:column; justify-content:center; }
      @media (prefers-reduced-motion:reduce){ .content section { min-height:0; } .content section .card, .hero .card { transform:none!important; opacity:1!important; } }
      /* SKILL EXPLAINER */
      #skills .chip { cursor:help; transition:background .15s, border-color .15s, color .15s; }
      #skills .chip:hover, #skills .chip.lit { background:rgba(129,140,248,.2); border-color:rgba(129,140,248,.6); color:#e0e7ff; }
      #skpop { position:fixed; z-index:22; max-width:290px; padding:.65rem .8rem; border-radius:11px;
        background:rgba(9,13,30,.98); border:1px solid rgba(129,140,248,.45); box-shadow:0 18px 48px rgba(0,0,0,.65);
        color:#cbd5e1; font-size:.82rem; line-height:1.5; opacity:0; transform:translateY(5px); pointer-events:none;
        transition:opacity .15s ease, transform .15s ease; }
      #skpop.show { opacity:1; transform:translateY(0); pointer-events:auto; }
      #skpop b { color:#c7d2fe; display:block; margin-bottom:.2rem; font-size:.88rem; }
      /* PLANET BADGE per section */
      .pbadge { margin-left:auto; font-size:.76rem; font-weight:600; color:var(--indigo2);
        background:rgba(129,140,248,.12); border:1px solid rgba(129,140,248,.3);
        padding:.22rem .65rem; border-radius:999px; white-space:nowrap; letter-spacing:.01em; }
      @media (max-width:560px){ #nav a{ padding:.35rem .6rem; font-size:.74rem } #nav{ gap:0 } }
      @media (max-width:820px){ #hud { display:none; } }
      @media (max-width:560px){ .job-meta{text-align:left} h1{font-size:1.8rem} }
    </style>
    </head>
    <body>
      <canvas id="bg"></canvas>
      <div id="hud">
        <div class="hud-bar" onclick="document.getElementById('hud').classList.toggle('min')" title="lemoncluster live metrics">
          <span class="live"></span><b>lemoncluster</b><span class="caret">▲</span>
        </div>
        <div class="hud-body">
          <div class="row"><div class="top"><span>pods running</span><span class="val g" id="m-pods">14 / 14</span></div><div class="track"><div class="fill" id="f-pods" style="width:100%"></div></div></div>
          <div class="row"><div class="top"><span>cpu</span><span class="val" id="m-cpu">38%</span></div><div class="track"><div class="fill" id="f-cpu" style="width:38%"></div></div></div>
          <div class="row"><div class="top"><span>memory</span><span class="val" id="m-mem">52%</span></div><div class="track"><div class="fill" id="f-mem" style="width:52%"></div></div></div>
          <div class="row"><div class="top"><span>req/s</span><span class="val g" id="m-req">1204</span></div><canvas id="spark" width="230" height="30"></canvas></div>
          <div class="row"><div class="top"><span>nodes (karpenter)</span><span class="val" id="m-nodes">4</span></div></div>
          <div class="foot"><span id="m-up">uptime 42d 06:12:44</span> · flux ✔ synced</div>
        </div>
      </div>
      <div id="tip"></div>
      <div id="skpop"></div>
      <div id="banner"></div>
      <button id="term-btn" onclick="toggleTerm()" title="Open terminal (or press the ` key)">❯_ terminal</button>
      <nav id="nav">
        <a href="#summary">☀️ Summary</a>
        <a href="#skills">🌍 Skills</a>
        <a href="#experience">🪐 Experience</a>
        <a href="#projects">💍 Projects</a>
        <a href="#certs">🔵 Certs</a>
      </nav>
      <div class="content">
        <header class="hero">
          <div class="card">
            <div class="avatar"><img src="photo.jpg" alt="Moath Salman"></div>
            <h1>Moath Salman</h1>
            <div class="role"><span id="role-text">Platform Engineer</span><span class="cursor">▋</span></div>
            <div class="badge">🇺🇸 U.S. Citizen · No sponsorship required</div>
            <div class="contact">
              <a href="mailto:moathsalman96@gmail.com">moathsalman96@gmail.com</a>
              <span>Chicago, IL</span>
              <a href="https://www.linkedin.com/in/moath-salman1a/" target="_blank" rel="noopener">LinkedIn</a>
              <a href="https://github.com/Bakmurat" target="_blank" rel="noopener">GitHub</a>
            </div>
            <div class="btns">
              <a class="btn btn-primary" href="#experience">View experience</a>
              <a class="btn btn-ghost" href="resume.pdf" download>Download Resume PDF</a>
              <button class="btn btn-trivia" onclick="startQuiz()">☁️ Cloud Trivia</button>
            </div>
          </div>
        </header>

        <section class="summary" id="summary"><div class="card reveal">
          <h2>Professional Summary<span class="pbadge">☀️ Sun</span></h2>
          <p>Platform Engineer with 5+ years building and operating cloud-native infrastructure that improves
          developer velocity, system reliability, and engineering efficiency. Increased engineering delivery speed
          by ~40% by consolidating fragmented CI/CD pipelines into a unified workflow supporting 8+ services.
          Combines infrastructure automation, GitOps delivery, production observability, and AI-assisted workflows
          to reduce operational overhead and help teams ship faster and more reliably.</p>
        </div></section>

        <section id="skills"><div class="card reveal">
          <h2>Skills<span class="pbadge">🌍 Earth</span></h2>
          <div class="skill-group"><div class="skill-label">Cloud Platforms &amp; Infra</div><div class="chips"><span class="chip">AWS (EKS, IAM, ALB/NLB)</span><span class="chip">Azure (AKS, Azure AD, ACR)</span></div></div>
          <div class="skill-group"><div class="skill-label">Containers &amp; Orchestration</div><div class="chips"><span class="chip">Kubernetes</span><span class="chip">Helm</span><span class="chip">Docker</span><span class="chip">Karpenter</span><span class="chip">Kustomize</span><span class="chip">NGINX Ingress</span><span class="chip">HPA</span><span class="chip">KEDA</span><span class="chip">Rancher</span></div></div>
          <div class="skill-group"><div class="skill-label">Service Mesh &amp; Networking</div><div class="chips"><span class="chip">Istio (Gateways, VirtualService, mTLS)</span><span class="chip">Envoy</span><span class="chip">Kubernetes Gateway API</span><span class="chip">Cloudflare Tunnel</span><span class="chip">NetworkPolicy</span></div></div>
