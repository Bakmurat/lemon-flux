apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-lem-devkuban-cert
  namespace: istio-system
spec:
  commonName: '*.lem.devkuban.com'
  dnsNames:
    - '*.lem.devkuban.com'
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns-issuer-lem-domain
  secretName: wildcard-lem-devkuban-com-tls
