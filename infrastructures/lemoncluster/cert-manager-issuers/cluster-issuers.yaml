apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token-secret-lem
  namespace: cert-manager
type: Opaque
data:
  # The same token as the original but with a new secret name for clarity
  api-token: RlR0WlRYZVNCUS1MNXpkMU8xRGh0WHNEbmlzLWZsNmdvWjZPQlotZg==
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns-issuer-lem-domain
spec:
  acme:
    email: bakmuratkubanaliev@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns-private-key-lem
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token-secret-lem
              key: api-token
        selector:
          dnsZones:
            - "lem.devkuban.com"
