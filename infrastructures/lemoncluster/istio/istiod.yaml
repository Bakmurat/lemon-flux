apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 1h
  dependsOn:
    - name: istio-base
  chart:
    spec:
      chart: istiod
      version: "1.26.0"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: istio-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    global:
      proxy:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      tag: 1.26.0
    pilot:
      autoscaleEnabled: false
      replicaCount: 3
      resources:
        requests:
          cpu: 300m
          memory: 512Mi
        limits:
          cpu: 600m
          memory: 1Gi
      env:
        PILOT_TRACE_SAMPLING: "10"
        PILOT_PUSH_THROTTLE: "100"
    meshConfig:
      enableTracing: true
      enablePrometheusMerge: true
      defaultConfig:
        tracing:
          zipkin:
            address: "zipkin.monitoring:9411"
